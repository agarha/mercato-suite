; Development PHP config — verbose errors on, generous limits.
; DO NOT ship to production. See docker/wordpress/php.prod.ini for prod profile.
memory_limit=512M
upload_max_filesize=64M
post_max_size=64M
max_execution_time=120
display_errors=On
display_startup_errors=On
log_errors=On
error_log=/dev/stderr
opcache.enable=1
opcache.validate_timestamps=1
opcache.revalidate_freq=2
