apiVersion: apps/v1
kind: Deployment
metadata:
  name: mercato-outbox-relay
  labels:
{{ include "mercato.labels" . | indent 4 }}
spec:
  replicas: {{ .Values.outboxRelay.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: outbox-relay
{{ include "mercato.selectorLabels" . | indent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: outbox-relay
{{ include "mercato.selectorLabels" . | indent 8 }}
    spec:
      containers:
        - name: outbox-relay
          image: "{{ .Values.outboxRelay.image.repository }}:{{ .Values.outboxRelay.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          env:
            - name: DATABASE_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.wordpress.secretRef }}
                  key: MERCATO_DATABASE_DSN
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: mercato-suite-config
                  key: MERCATO_KAFKA_BROKERS
            - name: KAFKA_TOPIC
              value: {{ .Values.outboxRelay.topic | quote }}
            - name: BATCH_SIZE
              value: {{ .Values.outboxRelay.batchSize | quote }}
            - name: POLL_INTERVAL_MS
              value: {{ .Values.outboxRelay.pollIntervalMs | quote }}
          resources:
{{ toYaml .Values.outboxRelay.resources | indent 12 }}
