apiVersion: apps/v1
kind: Deployment
metadata:
  name: mercato-wordpress
  labels:
{{ include "mercato.labels" . | indent 4 }}
spec:
  replicas: {{ .Values.wordpress.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: wordpress
{{ include "mercato.selectorLabels" . | indent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: wordpress
{{ include "mercato.selectorLabels" . | indent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: wordpress
          image: "{{ .Values.wordpress.image.repository }}:{{ .Values.wordpress.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: 80
          envFrom:
            - configMapRef:
                name: mercato-suite-config
            - secretRef:
                name: {{ .Values.wordpress.secretRef }}
          readinessProbe:
            httpGet:
              path: /?rest_route=/mercato/v1/health/live
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /?rest_route=/mercato/v1/health/live
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
{{ toYaml .Values.wordpress.resources | indent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
---
apiVersion: v1
kind: Service
metadata:
  name: mercato-wordpress
  labels:
{{ include "mercato.labels" . | indent 4 }}
spec:
  selector:
    app.kubernetes.io/component: wordpress
{{ include "mercato.selectorLabels" . | indent 4 }}
  ports:
    - name: http
      port: {{ .Values.wordpress.service.port }}
      targetPort: http
